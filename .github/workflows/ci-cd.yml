name: FraudShield AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-validation:
    name: Backend Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv Package Manager
      run: curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Install dependencies
      run: |
        cd backend
        uv pip install --system -r requirements.txt

    - name: Verify Ruff Code Style
      run: |
        cd backend
        # Triggers warning or failure if syntax style is broken
        # (Ruff check is fast and modern)
        uv run pip install ruff
        uv run ruff check .

    - name: Run Pytest Test Suite
      run: |
        cd backend
        # Execute test suite bypass rate-limits
        ENV=testing uv run pytest

  frontend-validation:
    name: Frontend Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: TypeScript Typecheck
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Production Build Check
      run: |
        cd frontend
        npm run build
