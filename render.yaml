# Render Blueprint Specification for FraudShield AI Backend
# This configuration spins up PostgreSQL, Redis, and the FastAPI backend service.

services:
  # 1. FastAPI Backend Web Service
  - type: web
    name: fraudshield-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /health
    startCommand: uvicorn api.main:app --host 0.0.0.5 --port $PORT
    envVars:
      - key: ENV
        value: production
      # Automatically binds PostgreSQL connection string from the database resource below
      - key: DATABASE_URL_DOCKER
        fromDatabase:
          name: fraudshield-postgres
          property: connectionString
      # Automatically binds Redis connection string from the Redis resource below
      - key: REDIS_URL_DOCKER
        fromService:
          type: redis
          name: fraudshield-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Generates a random secure key automatically
      - key: JWT_ALGORITHM
        value: HS256
      - key: OPENAI_API_KEY
        sync: false # You will input your real OpenAI key in the Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-2024-08-06
      - key: PORT
        value: 10000

# 2. PostgreSQL Database Resource
databases:
  - name: fraudshield-postgres
    databaseName: fraudshield
    user: postgres
    plan: free

# 3. Redis Cache Resource (Rate Limiter)
redis:
  - name: fraudshield-redis
    plan: free
    ipAllowList: [] # Access restricted only to internal services
