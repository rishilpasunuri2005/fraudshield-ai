# Render Blueprint Specification for FraudShield AI Backend
# This configuration spins up PostgreSQL, Redis, and the FastAPI backend service.

services:
  # 1. FastAPI Backend Web Service
  - type: web
    name: fraudshield-backend
    env: docker
    dockerContext: .  # Build context is the repo root
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      # Render injects DATABASE_URL as postgresql:// — config.py auto-converts to asyncpg
      - key: DATABASE_URL
        fromDatabase:
          name: fraudshield-postgres
          property: connectionString
      # Also set the Docker variant so config.py get_database_url works in production
      - key: DATABASE_URL_DOCKER
        fromDatabase:
          name: fraudshield-postgres
          property: connectionString
      # Redis connection string
      - key: REDIS_URL
        fromService:
          type: redis
          name: fraudshield-redis
          property: connectionString
      - key: REDIS_URL_DOCKER
        fromService:
          type: redis
          name: fraudshield-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: NVIDIA_API_KEY
        value: your-nvidia-api-key-here  # Update this in the Render dashboard with your real key
      - key: NVIDIA_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: LOG_LEVEL
        value: INFO
      - key: SQLITE_FALLBACK
        value: "false"

  # 2. Redis Cache Service (Rate Limiter)
  - type: redis
    name: fraudshield-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Anywhere

# 3. PostgreSQL Database Resource
databases:
  - name: fraudshield-postgres
    plan: free
