# Render Blueprint Specification for FraudShield AI Backend
# This configuration spins up PostgreSQL, Redis, and the FastAPI backend service.

services:
  # 1. FastAPI Backend Web Service
  - type: web
    name: fraudshield-backend
    env: docker
    dockerContext: . # Repo root so Dockerfile COPY paths (backend/...) resolve correctly
    dockerfilePath: backend/Dockerfile # Path relative to the repository root
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: SQLITE_FALLBACK
        value: "false" # Never fall back to empty SQLite in production
      # Automatically binds PostgreSQL connection string (must match config.py key)
      - key: DATABASE_URL
        fromDatabase:
          name: fraudshield-postgres
          property: connectionString
      # Automatically binds Redis connection string (must match config.py key)
      - key: REDIS_URL
        fromService:
          type: redis
          name: fraudshield-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Generates a random secure key automatically
      - key: JWT_ALGORITHM
        value: HS256
      - key: GROQ_API_KEY
        sync: false # You will input your free Groq key in the Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-specdec

  # 2. Redis Cache Service (Rate Limiter)
  - type: redis
    name: fraudshield-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Anywhere

# 3. PostgreSQL Database Resource
databases:
  - name: fraudshield-postgres
    plan: free
